<div class="admin-detail-header">
  <div>
    <p class="admin-eyebrow">SHOFFEEKO HQ</p>
    <h1 id="detailOrderId">Order Detail</h1>
  </div>

  <a class="admin-secondary-btn" href="admin-orders.html">
    Back to Orders
  </a>
</div>

<section class="admin-detail-grid">
  <div class="admin-panel">
    <h2>Customer Information</h2>

    <div class="admin-info-row">
      <span>Customer</span>
      <strong id="detailCustomerName"></strong>
    </div>

    <div class="admin-info-row">
      <span>Email</span>
      <strong id="detailCustomerEmail"></strong>
    </div>

    <div class="admin-info-row">
      <span>Date</span>
      <strong id="detailOrderDate"></strong>
    </div>
  </div>

  <div class="admin-panel">
    <h2>Order Summary</h2>

    <div class="admin-info-row">
      <span>Payment</span>
      <strong id="detailPaymentStatus"></strong>
    </div>

    <div class="admin-info-row">
      <span>Status</span>
      <strong id="detailOrderStatus"></strong>
    </div>

    <div class="admin-info-row">
    <span>Update Status</span>
    <div>
        <select id="orderStatusSelect">
        <option>Pending</option>
        <option>Processing</option>
        <option>Shipped</option>
        <option>Delivered</option>
        <option>Cancelled</option>
        <option>Refunded</option>
        </select>

        <button id="saveOrderStatusBtn" class="admin-table-btn admin-edit">
        Save
        </button>
    </div>
    </div>

    <div class="admin-info-row">
      <span>Total</span>
      <strong id="detailOrderTotal"></strong>
    </div>
  </div>
</section>

<section class="admin-panel">
  <h2>Items Purchased</h2>

  <div id="detailOrderItems"></div>
