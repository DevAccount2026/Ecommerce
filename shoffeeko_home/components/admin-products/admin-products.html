<div class="admin-products">
  <div class="admin-dashboard__header admin-products__header">
    <div>
      <p class="admin-dashboard__eyebrow">ShoffeeKo HQ</p>
      <h1>Products</h1>
    </div>

    <button class="admin-primary-btn" id="addProductBtn">Add Product</button>
  </div>

  <div class="admin-products-toolbar">
    <input id="productSearchInput" type="search" placeholder="Search by product name, ID, or category..." />

    <select id="productCategoryFilter">
      <option value="all">All Categories</option>
      <option value="Arabica">Arabica</option>
      <option value="Flavored Coffee">Flavored Coffee</option>
      <option value="Espresso">Espresso</option>
      <option value="Decaf">Decaf</option>
    </select>
  </div>

  <section class="admin-panel">
    <div class="admin-panel__header">
      <h2>All Products</h2>
      <span class="admin-panel__link" id="productsCount">0 products</span>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Product ID</th>
            <th>Category</th>
            <th>Price</th>
            <th>Inventory</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="productsTableBody"></tbody>
      </table>
    </div>
  </section>
</div>
