<div class="admin-dashboard">
  <div class="admin-dashboard__header">
    <div>
      <p class="admin-dashboard__eyebrow">ShoffeeKo HQ</p>
      <h1>Admin Dashboard</h1>
    </div>
  </div>

  <div class="admin-stats-grid" id="adminStatsGrid"></div>

  <div class="admin-analytics-grid">

    <section class="admin-panel admin-sales-chart">
      <div class="admin-panel__header">
        <h2>Sales Performance</h2>
        <span class="admin-panel__link">Last 7 Days</span>
      </div>

      <div class="admin-chart-wrap">
        <canvas id="salesPerformanceChart"></canvas>
      </div>
    </section>

    <section class="admin-panel admin-category-chart">
      <div class="admin-panel__header">
        <h2>Top Product Categories</h2>
      </div>

      <div class="admin-donut-wrap">
        <canvas id="topCategoriesChart"></canvas>
      </div>
    </section>

    <section class="admin-panel admin-status-chart">
      <div class="admin-panel__header">
        <h2>Order Status Distribution</h2>
      </div>

      <div class="admin-donut-wrap">
        <canvas id="orderStatusChart"></canvas>
      </div>
    </section>

  </div>

  <div class="admin-dashboard-grid">

    <section class="admin-panel admin-recent-orders">
      <div class="admin-panel__header">
        <h2>Recent Orders</h2>
        <a href="#" class="admin-panel__link">View All</a>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Date</th>
              <th>Customer</th>
              <th>Total</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="recentOrdersTable"></tbody>
        </table>
      </div>
    </section>

    <section class="admin-panel admin-low-stock">
      <div class="admin-panel__header">
        <h2>Low Stock Alerts</h2>
        <a href="#" class="admin-panel__link">Inventory</a>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>SKU</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="lowStockTable"></tbody>
        </table>
      </div>
    </section>

  </div>
</div>
