<section class="addresses-page sk-container">
  <div class="addresses-page__header">
    <p class="eyebrow">My Account</p>
    <h1>Saved Addresses</h1>
    <p>Manage your delivery addresses for faster checkout.</p>
  </div>

  <form class="address-form" id="addressForm">
    <input type="hidden" id="addressId" />

    <div class="address-form__grid">
      <input id="firstName" placeholder="First Name" required />
      <input id="lastName" placeholder="Last Name" required />
      <input id="phone" placeholder="Phone Number" required />
      <input id="customerEmail" type="email" placeholder="Email Address" required />
      <input id="address" placeholder="Street / Barangay" required />
      <input id="city" placeholder="City" required />
      <input id="postalCode" placeholder="Postal Code" required />
      <input id="country" placeholder="Country" required />
    </div>

    <label class="default-check">
      <input type="checkbox" id="isDefault" />
      Set as default address
    </label>

    <button type="submit" class="address-btn">Save Address</button>
    <button type="button" class="address-btn address-btn--ghost" id="cancelEditBtn">
      Cancel Edit
    </button>
  </form>

  <div class="addresses-list" id="addressesList"></div>
</section>
