<section class="support-detail-hero">
  <p class="support-eyebrow">Customer Care</p>
  <h1 id="ticketTitle">Support Ticket</h1>
  <p id="ticketSubtitle">View your conversation with support.</p>
</section>

<section class="support-detail-actions">
  <a href="support.html" class="support-secondary-btn">Back to Support</a>
  <a href="cust_myaccount.html" class="support-secondary-btn">My Account</a>
</section>

<section class="support-detail-card" id="ticketDetailCard"></section>

<section class="support-thread-card">
  <div class="support-thread-header">
    <h2>Conversation</h2>
    <span id="replyCount">0 replies</span>
  </div>

  <div class="support-thread" id="supportThread"></div>

  <form class="support-reply-form" id="supportReplyForm">
    <label>
      Reply
      <textarea id="supportReplyMessage" rows="4" required></textarea>
    </label>

    <button type="submit" class="support-primary-btn">
      Send Reply
    </button>
  </form>
</section>
