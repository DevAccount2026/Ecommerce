<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order History</title>

  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../components/order-history/order-history.css" />
</head>
<body>

  <main class="order-history-page">
   <section class="order-history-header">

    <div class="order-history-header__top">
        <div>
        <p class="eyebrow">My Account</p>
        <h1>Order History</h1>
        <p>View and track all your previous orders.</p>
        </div>

        
    </div>

    </section>
    

    <section class="order-history-tools">
      <input type="search" id="orderSearch" placeholder="Search order number..." />
      

      <select id="statusFilter">
        <option value="all">All Status</option>
        <option value="Pending">Pending</option>
        <option value="Processing">Processing</option>
        <option value="Shipped">Shipped</option>
        <option value="Delivered">Delivered</option>
        <option value="Cancelled">Cancelled</option>
      </select>

      <div class="order-history-header__actions">
        <a href="./cust_account.html" class="order-header-btn">
            Back to My Account
        </a>

        <a href="./catalog-page.html" class="order-header-btn order-header-btn--primary">
            Continue Shopping
        </a>

    </div>
    
    </section>

    

    <section class="order-history-card">
      <table>
        <thead>
          <tr>       
            <th>Order #</th>
            <th>Date</th>
            <th>Items</th>
            <th>Payment</th>
            <th>Status</th>
            <th>Total</th>
            <th>Track</th>
            <th>Purchased Items</th>         
          </tr>
        </thead>

        <tbody id="orderHistoryBody"></tbody>
      </table>

      <p class="empty-orders" id="emptyOrders" hidden>No orders found.</p>
    </section>
  </main>

  <script src="../components/order-history/order-history.js"></script>
</body>
</html>
