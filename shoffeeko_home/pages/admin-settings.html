<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoffeeKo Admin Settings</title>

  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../components/admin-dashboard/admin-dashboard.css" />
  <link rel="stylesheet" href="../components/admin-settings/admin-settings.css" />
</head>
<body>

  <div class="admin-shell">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar__brand">
        <span class="admin-sidebar__logo">S</span>
        <span>ShoffeeKo HQ</span>
      </div>

      <nav class="admin-sidebar__nav">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-orders.html">Orders</a>
        <a href="admin-products.html">Products</a>
        <a href="admin-inventory.html">Inventory</a>
        <a href="admin-customers.html">Customers</a>
        <a href="admin-analytics.html">Analytics</a>
        <a href="admin-marketing.html">Marketing</a>
        <a href="admin-settings.html" class="active admin-nav-settings">
              Settings
        </a>
      </nav>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <div class="admin-search">
          <span>⌕</span>
          <input type="search" placeholder="Search settings..." />
        </div>

        <div class="admin-topbar__actions">
          <button class="admin-icon-btn">🔔</button>
          <button class="admin-icon-btn">✉️</button>

          <div class="admin-profile">
            <div class="admin-profile__avatar">A</div>
            <span>Admin</span>
          </div>
        </div>
      </header>

      <main class="admin-page">
        <section 
          id="adminSettingsPage" 
          data-api="../api/admin-settings.json">
        </section>
      </main>
    </div>
  </div>
        <script src="../components/admin-sidebar/admin-sidebar.js"></script>
        <script src="../components/admin-settings/admin-settings.js"></script>
</body>
</html>
