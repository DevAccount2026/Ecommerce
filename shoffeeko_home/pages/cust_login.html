<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>ShoffeeKo | Login</title>

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../components/auth/auth.css">
</head>

<body>

  <div id="site-header"></div>

  <main class="auth-page">

    <div class="auth-card">

      <h1>Login</h1>

      <form id="loginForm">

        <label>
          Email
          <input type="email" id="loginEmail" required>
        </label>

        <label>
          Password
          <input type="password" id="loginPassword" required>
        </label>

        <button type="submit">
          Sign In
        </button>

      </form>

      <p>
        Don't have an account?
        <a href="cust_register.html">Create Account</a>
      </p>

    </div>

  </main>

  <div id="site-footer"></div>

  <script src="../assets/js/module-loader.js"></script>
  <script src="../components/auth/auth.js"></script>

</body>
</html>
